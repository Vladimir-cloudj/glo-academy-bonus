<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Heroes Database</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>🦸 Marvel Heroes Database</h1>
        <p>База данных персонажей Marvel Cinematic Universe</p>
    </header>

    <main class="container">
        <div class="filter-section">
            <label for="movieFilter">🎬 Фильтр по фильму:</label>
            <select id="movieFilter">
                <option value="all">Все герои</option>
            </select>
        </div>

        <div class="stats">
            <span id="heroesCount">Загрузка...</span>
        </div>

        <div id="heroesGrid" class="heroes-grid">
        </div>
    </main>

    <footer class="footer">
        <p>© 2024 Marvel Heroes Database | Учебный проект</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
